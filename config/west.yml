manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
    - name: urob # necessary for the timeless home row mod
      url-base: https://github.com/urob
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: 8feeb52eafc716c1697cfe0515e98b78281c3543
      import: app/west.yml
    - name: zmk-helpers # necessary for the timeless home row mod
      remote: urob
      revision: main
      path: config/zmk-helpers
  self:
    path: config
